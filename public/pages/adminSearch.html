<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Book Reservation</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body class="bg">
    <header>
      <nav class="navbar">
        <a class="logo" href="AdminHome.html">LabReserve.</a>

        <ul class="nav-links" id="navLinks">
          <li><a href="labs.html">Laboratories</a></li>
          <li><a href="reservation.html">Reserve</a></li>
          <li><a href="manage.html">Manage</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
      </nav>
    </header>

<main class="container">
<h2>Free Slots search</h2>
<p class="subtitle">Search for students and view their reservation history.</p>
  
<div class="form-card">
<form id="searchForm">
          <div class="form-group">
            <label>Laboratory</label>
            <select id="searchLab" required>
              <option disabled selected>Select a lab</option>
              <option>Lab 1</option>
              <option>Lab 2</option>
              <option>Lab 3</option>
              <option>Lab 4</option>
              <option>Lab 5</option>
              <option>Lab 6</option>
            </select>
          </div>
          
             <div class="form-row">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="searchDate" required />
            </div>

            <div class="form-group">
              <label>Start Time</label>
              <input type="time" id="searchStartTime" required />
            </div>

            <div class="form-group">
              <label>End Time</label>
              <input type="time" id="searchEndTime" required />
            </div>
          </div>

          <button type="submit" class="btn-large">Search</button>
        </form>
</div>

<div id="searchResults" style="display: none; margin-top: 30px;">
  <h3>Available Slots</h3>
  <div id="slotsContainer" class="slots-grid">
    
  </div>
</div>

</main>

<script src="/js/script.js"></script>

</body>

</html>
